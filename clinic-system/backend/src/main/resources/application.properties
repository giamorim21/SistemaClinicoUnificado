spring.application.name=clinic-system

# ==============================
# Banco de Dados (PostgreSQL Local)
# ==============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clinic_system}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# 'update' cria tabelas se nao existem e nao apaga dados.
# Para reset completo defina DDL_AUTO=create na primeira execucao.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JWT - Seguranca
# ==============================
security.jwt.secret=${JWT_SECRET:dev-secret-please-change-32chars-minimum-123456}
security.jwt.expiration-ms=3600000

# ==============================
# Super usuario (Manager global)
# ==============================
app.admin.email=${ADMIN_EMAIL:admin@scu.local}
app.admin.password=${ADMIN_PASSWORD:Admin#123}
app.admin.name=${ADMIN_NAME:Administrador SCU}
app.admin.cpf=${ADMIN_CPF:00000000000}
