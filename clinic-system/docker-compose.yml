services:

  # ── Banco de Dados ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       clinic_system
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d clinic_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Spring Boot) ─────────────────────────────────────────────────
  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/clinic_system
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      DDL_AUTO:                   ${DDL_AUTO:-update}
      JWT_SECRET:                 ${JWT_SECRET:-dev-secret-please-change-32chars-minimum-123456}
      ADMIN_EMAIL:                ${ADMIN_EMAIL:-admin@scu.local}
      ADMIN_PASSWORD:             ${ADMIN_PASSWORD:-Admin#123}
      ADMIN_NAME:                 ${ADMIN_NAME:-Administrador SCU}
      ADMIN_CPF:                  ${ADMIN_CPF:-00000000000}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (React + Nginx) ──────────────────────────────────────────────
  frontend:
    build: ./frontend/sistema-clinico-unificado-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
